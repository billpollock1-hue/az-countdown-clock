<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BB Returns - Silhouette Progress</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      padding: 20px;
      max-width: 100%;
      height: 100%;
      justify-content: center;
    }

    .title {
      color: white;
      font-size: 32px;
      font-weight: bold;
      text-align: center;
    }

    .silhouette-wrapper {
      position: relative;
      width: 240px;
      height: 520px;
      border: 3px solid white;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .silhouette-base {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://raw.githubusercontent.com/billpollock1-hue/az-countdown-clock/main/Brian.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0) contrast(1.2);
      z-index: 1;
    }

    .progress-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0%;
      background: linear-gradient(to top, #7fd900, #90ee90);
      opacity: 0.85;
      z-index: 2;
      transition: height 0.1s linear;
    }

    .progress-info {
      color: white;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
