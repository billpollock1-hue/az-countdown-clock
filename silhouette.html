<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BB Returns - Silhouette Progress</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 26px;
      padding: 14px;
      max-width: 100%;
      height: 100%;
      justify-content: center;
    }

    .title {
      color: white;
      font-size: 32px;
      font-weight: bold;
      text-align: center;
    }

    .silhouette-wrapper {
      position: relative;
      width: 216px;
      height: 468px;
      border: 3px solid white;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .photo-full {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://raw.githubusercontent.com/billpollock1-hue/az-countdown-clock/main/Pool.jpg');
      background-size: cover;
      background-position: center;
      z-index: 1;
    }

    /* Clipping window that grows from the bottom to reveal the outline */
    .outline-reveal {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0%;
      overflow: hidden;
      z-index: 2;
      transition: height 0.1s linear;
    }

    /* Fixed full-size outline image; only the part inside .outline-reveal shows */
    .outline-image {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 216px;
      height: 468px;
      background-image: url('https://raw.githubusercontent.com/billpollock1-hue/az-countdown-clock/main/PoolOutline.png');
      background-size: cover;
      background-position: center;
    }

    .progress-info {
      color: white;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .progress-percent {
      font-size: 48px;
      color: #7fff00;
      margin-top: 10px;
    }

    .arrival-date {
      color: rgba(255, 255, 255, 0.8);
      font-size: 16px;
      margin-top: 20px;
    }

    .view-toggle-link {
      display: block;
      text-align: center;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 20px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      margin-top: 20px;
      width: 216px;
      box-sizing: border-box;
    }

    .silhouette-stage {
      position: relative;
      width: 312px;
    }

    .annotation {
      position: absolute;
      left: 216px;
      margin-left: 10px;
      top: 0%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      z-index: 5;
      transition: top 0.1s linear;
      pointer-events: none;
    }

    .annotation-arrow {
      width: 0;
      height: 0;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      border-right: 9px solid #7fff00;
      margin-right: -1px;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
    }

    .annotation-box {
      background: #7fff00;
      color: #1a1a1a;
      padding: 5px 8px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: bold;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
    }

    .axis {
      position: absolute;
      left: 216px;
      margin-left: 10px;
      top: 0;
      height: 100%;
      width: 2px;
      z-index: 3;
    }

    .axis-track {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #7fff00;
    }

    .axis-track::before,
    .axis-track::after {
      content: '';
      position: absolute;
      left: -4px;
      width: 10px;
      height: 2px;
      background: #7fff00;
    }

    .axis-track::before { top: 0; }
    .axis-track::after { bottom: 0; }

    .axis-label {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      text-align: center;
      color: rgba(255, 255, 255, 0.85);
      font-size: 11px;
      font-weight: 700;
    }

    .axis-label-top { top: 2px; }
    .axis-label-bottom { bottom: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">BB Returns</div>
    
    <div class="silhouette-stage">
      <div class="axis">
        <div class="axis-track"></div>
        <div class="axis-label axis-label-top">100</div>
        <div class="axis-label axis-label-bottom">0</div>
      </div>

      <div class="silhouette-wrapper">
        <div class="photo-full"></div>
        <div class="outline-reveal" id="outlineReveal">
          <div class="outline-image"></div>
        </div>
      </div>

      <div class="annotation" id="annotation">
        <div class="annotation-arrow"></div>
        <div class="annotation-box"><span id="annotationPercent">0.00%</span></div>
      </div>
    </div>

    <div class="progress-info">
      <div id="daysLeft">--- days</div>
      <div class="progress-percent" id="progressPercent">0%</div>
    </div>

    <div class="arrival-date">
      Arriving: <span id="arrivalDate">Sep 10, 7:00 PM MST</span>
    </div>

    <a class="view-toggle-link" href="index.html">← Back to Countdown</a>
  </div>

  <script>
    // Countdown configuration
    const departureTime = new Date('2026-06-03T08:50:00-07:00').getTime();
    const arrivalTime = new Date('2026-09-10T19:00:00-07:00').getTime(); // 7 PM MST
    const totalTime = arrivalTime - departureTime;

    function updateProgress() {
      const now = new Date().getTime();
      const elapsed = now - departureTime;
      const remaining = arrivalTime - now;
      
      // Calculate percentage completed (0-100)
      const percentCompleted = Math.max(0, Math.min(100, (elapsed / totalTime) * 100));
      
      // Update outline reveal height (grows from bottom up)
      const outlineReveal = document.getElementById('outlineReveal');
      outlineReveal.style.height = percentCompleted + '%';

      // Update annotation: sits at the top edge of the reveal, pointing at it
      const annotation = document.getElementById('annotation');
      annotation.style.top = (100 - percentCompleted) + '%';
      document.getElementById('annotationPercent').textContent = percentCompleted.toFixed(2) + '%';
      
      // Update percentage text
      document.getElementById('progressPercent').textContent = percentCompleted.toFixed(2) + '%';
      
      // Update days left
      const daysLeft = Math.ceil(remaining / (1000 * 60 * 60 * 24));
      document.getElementById('daysLeft').textContent = Math.max(0, daysLeft) + ' days left';
      
      // Update arrival date
      const arrivalDate = new Date(arrivalTime);
      const options = { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', timeZone: 'America/Phoenix' };
      document.getElementById('arrivalDate').textContent = arrivalDate.toLocaleDateString('en-US', options) + ' MST';
    }

    // Initial update
    updateProgress();
    
    // Update every 100ms for smooth animation
    setInterval(updateProgress, 100);
  </script>
</body>
</html>
